<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Carro Arcade</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    #gameArea {
      position: relative;
      width: 400px;
      height: 600px;
      background: linear-gradient(#333, #111);
      overflow: hidden;
      border: 4px solid #000;
      box-shadow: 0 0 30px #0ff inset;
    }
    .roadLine {
      position: absolute;
      width: 10px;
      height: 80px;
      background: #fff;
      left: 195px;
      animation: moveLine 1s linear infinite;
    }
    @keyframes moveLine {
      from { top: -80px; }
      to { top: 600px; }
    }
    .car {
      position: absolute;
      bottom: 20px;
      left: 180px;
      width: 50px;
      height: 90px;
      background: linear-gradient(to bottom, red, darkred);
      border-radius: 10px;
      box-shadow: 0 0 20px #f00, 0 0 40px #f00 inset;
      transition: left 0.1s ease;
    }
    .obstacle {
      position: absolute;
      width: 50px;
      height: 90px;
      background: linear-gradient(to bottom, blue, navy);
      border-radius: 10px;
      box-shadow: 0 0 20px #00f, 0 0 40px #00f inset;
    }
    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0ff;
      font-size: 20px;
      text-shadow: 0 0 10px #0ff;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 36px;
      display: none;
      text-shadow: 0 0 20px red;
    }
    .explosion {
      position: absolute;
      width: 20px;
      height: 20px;
      background: yellow;
      border-radius: 50%;
      animation: explode 0.5s ease-out forwards;
    }
    @keyframes explode {
      from { transform: scale(1); opacity: 1; }
      to { transform: scale(5); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="gameArea">
    <div id="score">Pontuação: 0</div>
    <div class="car" id="playerCar"></div>
    <div id="gameOver">GAME OVER</div>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const playerCar = document.getElementById("playerCar");
    const scoreDisplay = document.getElementById("score");
    const gameOverText = document.getElementById("gameOver");

    let carX = 180;
    let score = 0;
    let gameOver = false;
    let speed = 5;

    // movimento do carro
    document.addEventListener("keydown", (e) => {
      if (gameOver) return;
      if (e.key === "ArrowLeft" && carX > 0) {
        carX -= 20;
      }
      if (e.key === "ArrowRight" && carX < 350) {
        carX += 20;
      }
      playerCar.style.left = carX + "px";
    });

    // criar linhas da pista
    function createRoadLines() {
      for (let i = 0; i < 10; i++) {
        const line = document.createElement("div");
        line.classList.add("roadLine");
        line.style.top = i * 60 + "px";
        gameArea.appendChild(line);
      }
    }
    createRoadLines();

    // criar obstáculos
    function createObstacle() {
      const obstacle = document.createElement("div");
      obstacle.classList.add("obstacle");
      obstacle.style.left = Math.floor(Math.random() * 7) * 50 + "px";
      obstacle.style.top = "-90px";
      gameArea.appendChild(obstacle);

      function moveObstacle() {
        if (gameOver) return;
        let obstacleTop = parseInt(obstacle.style.top);
        obstacleTop += speed;
        obstacle.style.top = obstacleTop + "px";

        // colisão
        if (
          obstacleTop + 90 >= 510 &&
          parseInt(obstacle.style.left) === carX
        ) {
          explode(carX, 510);
          gameOver = true;
          gameOverText.style.display = "block";
          return;
        }

        // pontuação
        if (obstacleTop > 600) {
          score++;
          scoreDisplay.textContent = "Pontuação: " + score;
          obstacle.remove();
          if (score % 5 === 0) speed++; // aumenta dificuldade
        } else {
          requestAnimationFrame(moveObstacle);
        }
      }
      requestAnimationFrame(moveObstacle);
    }

    // efeito de explosão
    function explode(x, y) {
      for (let i = 0; i < 10; i++) {
        const particle = document.createElement("div");
        particle.classList.add("explosion");
        particle.style.left = x + "px";
        particle.style.top = y + "px";
        gameArea.appendChild(particle);
        setTimeout(() => particle.remove(), 500);
      }
    }

    setInterval(() => {
      if (!gameOver) createObstacle();
    }, 1200);
  </script>
</body>
</html>
